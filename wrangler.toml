name = "flashlang"
main = "worker/index.ts"
compatibility_date = "2026-05-24"
workers_dev = true
preview_urls = true

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[[d1_databases]]
binding = "DB"
database_name = "flashlang"
database_id = "e674619b-f5d7-40f6-9dee-125d6ec82334"
migrations_dir = "migrations"
